name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_IMAGE: ghcr.io/galov/mywowdi:latest
  DEPLOY_PATH: /srv/mywowdi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://mywowdi.com
            PAYLOAD_PUBLIC_SERVER_URL=https://mywowdi.com
          secrets: |
            payload_secret=${{ secrets.PAYLOAD_SECRET }}
            database_url=${{ secrets.DATABASE_URL }}
            preview_secret=${{ secrets.PREVIEW_SECRET }}
          tags: |
            ${{ env.APP_IMAGE }}
            ghcr.io/galov/mywowdi:${{ github.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment files
        run: |
          scp -i ~/.ssh/deploy_key \
            docker-compose.production.yml \
            Caddyfile \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Sync media files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ env.DEPLOY_PATH }}/media'"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            public/media/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/media/"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << EOF
            set -eu
            cd "${{ env.DEPLOY_PATH }}"
            test -f .env.production || { echo ".env.production is missing on the server"; exit 1; }
            mkdir -p media
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            APP_IMAGE="${{ env.APP_IMAGE }}" docker compose -f docker-compose.production.yml --env-file .env.production pull
            APP_IMAGE="${{ env.APP_IMAGE }}" docker compose -f docker-compose.production.yml --env-file .env.production up -d --remove-orphans
            docker logout ghcr.io || true
          EOF
