services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    expose:
      - '3000'
    volumes:
      - ./media:/app/public/media

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env.production
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_config:
  caddy_data:
